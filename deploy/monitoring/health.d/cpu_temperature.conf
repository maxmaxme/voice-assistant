# CPU temperature alert tuned for Raspberry Pi 5.
# Pi 5 starts soft-throttling at 80°C and hard-throttles at 85°C, so we
# warn early enough to investigate before performance degrades.

 alarm: cpu_temperature
    on: sensors.temperature_cpu_thermal-virtual-0_temp1_input
 class: Utilization
  type: System
component: CPU
lookup: average -1m
 units: Celsius
 every: 10s
  warn: $this > 70
  crit: $this > 80
 delay: down 5m multiplier 1.5 max 1h
  info: average CPU package temperature over the last minute
    to: sysadmin
