# Override of the stock `docker_container_down` template, which ships
# with `container_name=!*` (i.e. disabled for everything). Enable it for
# the two containers we actually care about — voice-assistant and
# home-assistant. Both have docker healthchecks defined; this catches
# the case where the container exits entirely (restart loop), which is
# different from the `docker_container_unhealthy` stock alert.

    template: docker_container_down
          on: docker.container_state
       class: Errors
        type: Containers
   component: Docker
chart labels: container_name=voice-assistant home-assistant
       units: status
       every: 10s
      lookup: average -10s of exited
        warn: $this > 0
       delay: down 1m multiplier 1.5 max 2h
     summary: Docker container ${label:container_name} down
        info: Docker container ${label:container_name} is currently not running
          to: sysadmin
