# Watches the httpcheck job rendered by netdata-init from the
# EXTERNAL_HEALTHCHECK_URL env var. Fires when the % of successful
# probes over the last 2 minutes drops — i.e. DDNS is stale, the port
# forward is broken, the box is offline, or the service itself is down.
# If EXTERNAL_HEALTHCHECK_URL is unset there's no httpcheck job and this
# template silently matches nothing.

    template: httpcheck_external_down
          on: httpcheck.status
       class: Errors
        type: Web Server
   component: HTTP endpoint
chart labels: name=external_endpoint
      lookup: average -2m unaligned of success
       units: %
       every: 30s
        warn: $this < 75
        crit: $this < 25
       delay: down 2m multiplier 1.5 max 10m
     summary: External endpoint unreachable
        info: less than ${value}% of HTTP probes to the external endpoint succeeded over the last 2 minutes
          to: sysadmin
