services:
  voice-assistant:
    # CI publishes the image to GHCR; deploy/update.sh pulls it on a timer.
    # To build locally instead: `docker compose build voice-assistant`.
    image: ghcr.io/maxmaxme/voice-assistant:latest
    pull_policy: always
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: voice-assistant
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - '${AUDIO_GID:-29}'
    env_file:
      - ../.env
    volumes:
      # Persistent SQLite profile state.
      - ../data:/app/data
      # Wake-word models (custom .onnx files trained outside the image).
      - ../models:/app/models:ro
      # FIFO for /update Telegram command. The host-side va-update-listener.service
      # creates this FIFO and runs deploy/update.sh when a trigger is written to it.
      - /tmp/va-update:/tmp/va-update
    environment:
      # Make the same Node code that uses .venv/bin/python locally point at
      # the system Python inside the image.
      - WAKE_WORD_PYTHON=/usr/bin/python3
      # ALSA device selection — override in .env if your mic is not card 1.
      - ALSA_CARD=${ALSA_CARD:-1}
      # Server timezone (IANA name) — affects reminder scheduling/display.
      # Inside the container the system TZ is UTC, so we forward TZ from .env.
      - TZ=${TZ:-UTC}
    stop_grace_period: 10s
    healthcheck:
      # Both the Node entry point and the wake-word daemon must be alive.
      test:
        - 'CMD-SHELL'
        - '[ "$(pgrep -c -f ''node src/cli/unified.ts'')" -ge 1 ] && [ "$(pgrep -c -f ''wake_word_daemon.py'')" -ge 1 ]'
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Home Assistant runs alongside the assistant on the same Pi.
  # Persistent config lives at ../ha-data on the host (gitignored).
  # First-boot onboarding (create user, add MCP Server integration, expose
  # entities, create Long-Lived Access Token) still has to be done by hand
  # per docs/home-assistant-setup.md — bundling only saves the extra
  # compose file, not the per-install setup work.
  #
  # Voice-assistant reaches HA via Docker DNS at http://home-assistant:8123.
  # Set HA_URL accordingly in .env.
  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: home-assistant
    restart: unless-stopped
    volumes:
      - ../ha-data:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '8123:8123'

  # One-shot init container: writes Telegram alert config into the
  # netdataconfig volume before netdata starts. Values are taken from
  # the same TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID used by the assistant.
  # Idempotent — rewrites the file on every `docker compose up`.
  netdata-init:
    image: busybox:stable
    container_name: netdata-init
    restart: 'no'
    env_file:
      - ../.env
    volumes:
      - netdataconfig:/etc/netdata
    # `$$VAR` escapes compose-time substitution so busybox sh expands the
    # variable at runtime from env_file. Required vars: TELEGRAM_BOT_TOKEN,
    # TELEGRAM_CHAT_ID — both already used by the assistant itself.
    #
    # We also disable email (no sendmail in the netdata image) and remap
    # every alert role to the same Telegram chat — without per-role
    # mapping, alarm-notify.sh would only send to email recipients defined
    # in the stock config and silently skip Telegram.
    command:
      - sh
      - -c
      - |
        cat > /etc/netdata/health_alarm_notify.conf <<EOF
        # Generated by netdata-init. Edits here are overwritten on restart.
        SEND_EMAIL="NO"
        SEND_TELEGRAM="YES"
        TELEGRAM_BOT_TOKEN="$$TELEGRAM_BOT_TOKEN"
        DEFAULT_RECIPIENT_TELEGRAM="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[sysadmin]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[domainadmin]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[dba]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[webmaster]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[proxyadmin]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[silent]="$$TELEGRAM_CHAT_ID"
        EOF

  # System metrics + alerts. NOT exposed directly — sits on the internal
  # `monitoring` network and is reached via the Caddy reverse proxy with
  # basic auth. Telegram routing is set up by netdata-init; see
  # docs/monitoring-setup.md for tuning thresholds.
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: netdata
    restart: unless-stopped
    depends_on:
      netdata-init:
        condition: service_completed_successfully
    pid: host
    networks:
      - monitoring
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - NETDATA_DISABLE_CLOUD=1
      - DOCKER_HOST=/var/run/docker.sock
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Docker container logs viewer. Reached via the Caddy proxy on :8888;
  # no host port published directly.
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    hostname: dozzle
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true

  # Reverse proxy with basic auth in front of Netdata + Dozzle.
  # Credentials: MONITOR_USER + MONITOR_PASSWORD_HASH (bcrypt) in .env.
  # Generate the hash with:
  #   docker run --rm caddy:2-alpine caddy hash-password --plaintext '<password>'
  monitoring-proxy:
    image: caddy:2-alpine
    container_name: monitoring-proxy
    restart: unless-stopped
    depends_on:
      - netdata
      - dozzle
    networks:
      - monitoring
    env_file:
      - ../.env
    ports:
      - '19999:19999'
      - '8888:8888'
    volumes:
      - ./monitoring/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

networks:
  monitoring:
    driver: bridge

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
  caddydata:
  caddyconfig:
