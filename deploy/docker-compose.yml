services:
  voice-assistant:
    # CI publishes the image to GHCR; deploy/update.sh pulls it on a timer.
    # To build locally instead: `docker compose build voice-assistant`.
    image: ghcr.io/maxmaxme/voice-assistant:latest
    pull_policy: always
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: voice-assistant
    restart: unless-stopped
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - '${AUDIO_GID:-29}'
    env_file:
      - ../.env
    volumes:
      # Persistent SQLite profile state.
      - ../data:/app/data
      # Wake-word models (custom .onnx files trained outside the image).
      - ../models:/app/models:ro
      # FIFO for /update Telegram command. The host-side va-update-listener.service
      # creates this FIFO and runs deploy/update.sh when a trigger is written to it.
      - /tmp/va-update:/tmp/va-update
    environment:
      # Make the same Node code that uses .venv/bin/python locally point at
      # the system Python inside the image.
      - WAKE_WORD_PYTHON=/usr/bin/python3
      # ALSA device selection — override in .env if your mic is not card 1.
      - ALSA_CARD=${ALSA_CARD:-1}
      # Server timezone (IANA name) — affects reminder scheduling/display.
      # Inside the container the system TZ is UTC, so we forward TZ from .env.
      - TZ=${TZ:-UTC}
    stop_grace_period: 10s
    # HA runs in host network mode (for HomeKit/mDNS/Bluetooth discovery), so
    # it's not on the same docker network as us. Reach it via host.docker.internal.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      # The Node entry point must be alive. The wake-word daemon is optional
      # (only spawned when an ALSA capture device is present), so don't require
      # it — the runner logs a warn and keeps telegram/http running otherwise.
      test:
        - 'CMD-SHELL'
        - '[ "$(pgrep -c -f ''node src/cli/unified.ts'')" -ge 1 ]'
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Home Assistant runs alongside the assistant on the same Pi.
  # Persistent config lives at ../ha-data on the host (gitignored).
  # First-boot onboarding (create user, add MCP Server integration, expose
  # entities, create Long-Lived Access Token) still has to be done by hand
  # per docs/home-assistant-setup.md — bundling only saves the extra
  # compose file, not the per-install setup work.
  #
  # network_mode: host — required for HomeKit/mDNS/SSDP/Bluetooth discovery.
  # Side effect: HA is no longer on docker DNS, so voice-assistant reaches it
  # via http://host.docker.internal:8123 (set HA_URL accordingly in .env).
  # One-shot init container: downloads HACS into ha-data/custom_components/hacs
  # before HA starts. Idempotent — skips if HACS is already present. Adding
  # HACS as an integration in the HA UI (and approving GitHub device-flow) is
  # still a manual step — see docs/home-assistant-setup.md.
  hacs-init:
    image: alpine:3.20
    container_name: hacs-init
    restart: 'no'
    volumes:
      - ../ha-data:/config
    command:
      - sh
      - -c
      - |
        set -e
        if [ -d /config/custom_components/hacs ]; then
          echo "HACS already installed, skipping"
          exit 0
        fi
        apk add --no-cache bash wget
        mkdir -p /config
        cd /config
        wget -O - https://get.hacs.xyz | bash -

  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: home-assistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    depends_on:
      hacs-init:
        condition: service_completed_successfully
    volumes:
      - ../ha-data:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    devices:
      # All USB devices (Zigbee/Z-Wave/Sonoff dongles, etc.). Built-in
      # Bluetooth on Pi 5 is reached via /run/dbus, not /dev.
      - /dev/bus/usb:/dev/bus/usb

  # Matter fabric controller. The Matter integration in Home Assistant is
  # only a client — it talks to this server over WebSocket on :5580/ws.
  # Runs on host network for IPv6 link-local + mDNS, and needs BlueZ via
  # /run/dbus for BLE commissioning of new Matter devices. Persistent
  # fabric/credentials live in ../matter-data on the host (gitignored).
  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter-server
    restart: unless-stopped
    network_mode: host
    privileged: true
    security_opt:
      - apparmor:unconfined
    volumes:
      - ../matter-data:/data
      - /run/dbus:/run/dbus:ro
    command:
      - --storage-path=/data
      - --paa-root-cert-dir=/data/credentials

  # One-shot init container: writes Telegram alert config into the
  # netdataconfig volume before netdata starts. Values are taken from
  # the same TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID used by the assistant.
  # Idempotent — rewrites the file on every `docker compose up`.
  netdata-init:
    image: busybox:stable
    container_name: netdata-init
    restart: 'no'
    env_file:
      - ../.env
    volumes:
      - netdataconfig:/etc/netdata
    # `$$VAR` escapes compose-time substitution so busybox sh expands the
    # variable at runtime from env_file. Required vars: TELEGRAM_BOT_TOKEN,
    # TELEGRAM_CHAT_ID — both already used by the assistant itself.
    #
    # We also disable email (no sendmail in the netdata image) and remap
    # every alert role to the same Telegram chat — without per-role
    # mapping, alarm-notify.sh would only send to email recipients defined
    # in the stock config and silently skip Telegram.
    command:
      - sh
      - -c
      - |
        cat > /etc/netdata/health_alarm_notify.conf <<EOF
        # Generated by netdata-init. Edits here are overwritten on restart.
        SEND_EMAIL="NO"
        SEND_TELEGRAM="YES"
        TELEGRAM_BOT_TOKEN="$$TELEGRAM_BOT_TOKEN"
        DEFAULT_RECIPIENT_TELEGRAM="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[sysadmin]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[domainadmin]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[dba]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[webmaster]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[proxyadmin]="$$TELEGRAM_CHAT_ID"
        role_recipients_telegram[silent]="$$TELEGRAM_CHAT_ID"
        EOF

  # System metrics + alerts. NOT exposed directly — sits on the internal
  # `monitoring` network and is reached via the Caddy reverse proxy with
  # basic auth. Telegram routing is set up by netdata-init; see
  # docs/monitoring-setup.md for tuning thresholds.
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: netdata
    restart: unless-stopped
    depends_on:
      netdata-init:
        condition: service_completed_successfully
    pid: host
    networks:
      - monitoring
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      - NETDATA_DISABLE_CLOUD=1
      - DOCKER_HOST=/var/run/docker.sock
    volumes:
      - netdataconfig:/etc/netdata
      # Custom alert templates live in version control. The bind mount
      # overlays /etc/netdata/health.d (which otherwise comes from the
      # netdataconfig volume) so adding/removing alerts is just a git diff.
      - ./monitoring/health.d:/etc/netdata/health.d:ro
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Docker container logs viewer. Reached via the Caddy proxy on :8888;
  # no host port published directly.
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    hostname: dozzle
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true

  # Reverse proxy with basic auth in front of Netdata + Dozzle.
  # Credentials: MONITOR_USER + MONITOR_PASSWORD_HASH (bcrypt) in .env.
  # Generate the hash with:
  #   docker run --rm caddy:2-alpine caddy hash-password --plaintext '<password>'
  monitoring-proxy:
    image: caddy:2-alpine
    container_name: monitoring-proxy
    restart: unless-stopped
    depends_on:
      - netdata
      - dozzle
    networks:
      - monitoring
    env_file:
      - ../.env
    ports:
      - '19999:19999'
      - '8888:8888'
    volumes:
      - ./monitoring/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

networks:
  monitoring:
    driver: bridge

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:
  caddydata:
  caddyconfig:
